<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Hub</title>

<!-- Technical Font -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Orbitron', sans-serif;
}

body{
  height:100vh;
  overflow:hidden;
  color:white;
}

/* 🔥 Background Image + Overlay */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background: 
    linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
    url('https://images.unsplash.com/photo-1605902711622-cfb43c4437b1');
  background-size:cover;
  background-position:center;
  z-index:-2;
}

/* 🔥 Animated Gradient Glow */
body::after{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background: radial-gradient(circle, rgba(128,0,255,0.2), transparent);
  animation: moveGlow 10s linear infinite;
  z-index:-1;
}

@keyframes moveGlow{
  0%{ transform: translate(0,0); }
  50%{ transform: translate(-25%, -25%); }
  100%{ transform: translate(0,0); }
}

/* 🔥 Center Content */
.container{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

/* 🔥 Title */
h1{
  font-size:60px;
  letter-spacing:4px;
  text-transform:uppercase;
  text-shadow:0 0 20px #a020f0;
}

/* 🔥 Sub text */
p{
  margin-top:10px;
  font-size:18px;
  color:#ccc;
}

/* 🔥 Button */
.btn{
  margin-top:30px;
  padding:12px 30px;
  border:2px solid #a020f0;
  background:transparent;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  background:#a020f0;
  box-shadow:0 0 15px #a020f0;
}
</style>
</head>

<body>

<div class="container">
  <h1>Game Hub</h1>
  <p>Enter the next generation gaming zone</p>
  <button class="btn">Start</button>
</div>

</body>
</html>
