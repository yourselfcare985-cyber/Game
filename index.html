<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GamerZone</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Orbitron',sans-serif;
}

body{
  background:#0a0a0f;
  color:white;
  overflow-x:hidden;
}

/* 🔥 NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 60px;
}

.logo{
  font-size:24px;
  color:#00f7ff;
  text-shadow:0 0 10px #00f7ff;
}

.nav-links a{
  margin:0 15px;
  text-decoration:none;
  color:#ccc;
  transition:0.3s;
}

.nav-links a:hover{
  color:#ff00ff;
}

.btn{
  padding:10px 20px;
  border:none;
  background:linear-gradient(45deg,#00f7ff,#ff00ff);
  color:black;
  cursor:pointer;
  border-radius:20px;
}

/* 🔥 HERO SECTION */
.hero{
  display:flex;
  justify-content:center;
  align-items:center;
  height:70vh;
  padding:20px;
}

.hero-box{
  width:90%;
  height:100%;
  border-radius:20px;
  background:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)),
    url('https://images.unsplash.com/photo-1542751371-adc38448a05e');
  background-size:cover;
  background-position:center;
  box-shadow:0 0 40px rgba(255,0,255,0.4);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  animation: glow 4s infinite alternate;
}

@keyframes glow{
  from{ box-shadow:0 0 20px #ff00ff; }
  to{ box-shadow:0 0 50px #00f7ff; }
}

.hero h1{
  font-size:50px;
  text-shadow:0 0 20px #ff00ff;
}

.hero p{
  margin-top:10px;
  color:#ccc;
}

/* 🔥 GAME CARDS */
.games{
  padding:40px;
  text-align:center;
}

.games h2{
  margin-bottom:30px;
  letter-spacing:3px;
}

.card-container{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}

.card{
  width:220px;
  height:300px;
  border-radius:15px;
  overflow:hidden;
  position:relative;
  cursor:pointer;
  transition:0.3s;
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.card:hover{
  transform:scale(1.08);
  box-shadow:0 0 20px #ff00ff;
}

/* 🔥 FOOTER */
.footer{
  text-align:center;
  padding:20px;
  color:#777;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">🎮 GAMERZONE</div>

  <div class="nav-links">
    <a href="#">Home</a>
    <a href="#">Games</a>
    <a href="#">Esports</a>
    <a href="#">Community</a>
  </div>

  <button class="btn">Sign Up</button>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-box">
    <h1>YOUR ULTIMATE GAMING</h1>
    <p>Unleash the power. Play. Compete. Win.</p>
  </div>
</div>

<!-- GAMES -->
<div class="games">
  <h2>FEATURED GAMES</h2>

  <div class="card-container">

    <div class="card">
      <img src="https://wallpaperaccess.com/full/1605472.jpg">
    </div>

    <div class="card">
      <img src="https://wallpaperaccess.com/full/1142976.jpg">
    </div>

    <div class="card">
      <img src="https://wallpaperaccess.com/full/317501.jpg">
    </div>

    <div class="card">
      <img src="https://wallpaperaccess.com/full/4245086.jpg">
    </div>

  </div>
</div>

<div class="footer">
  © 2026 GamerZone
</div>

</body>
</html>
