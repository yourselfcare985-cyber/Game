<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Hub</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  height: 100vh;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

/* Animated background glow */
body::before {
  content: "";
  position: absolute;
  width: 600px;
  height: 600px;
  background: #38bdf8;
  filter: blur(150px);
  animation: move 8s infinite alternate;
}

@keyframes move {
  from { transform: translate(-200px, -200px); }
  to { transform: translate(200px, 200px); }
}

/* Container */
.container {
  text-align: center;
  z-index: 2;
}

/* Title */
h1 {
  font-size: 50px;
  margin-bottom: 10px;
  color: #38bdf8;
  text-shadow: 0 0 20px #38bdf8;
}

/* Subtitle */
p {
  color: #94a3b8;
  margin-bottom: 30px;
}

/* Buttons */
.buttons {
  display: flex;
  gap: 20px;
  justify-content: center;
}

button {
  padding: 12px 25px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

/* Play Button */
.play {
  background: #22c55e;
  color: black;
}

.play:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px #22c55e;
}

/* Login Button */
.login {
  background: transparent;
  border: 2px solid #38bdf8;
  color: #38bdf8;
}

.login:hover {
  background: #38bdf8;
  color: black;
  transform: scale(1.1);
  box-shadow: 0 0 20px #38bdf8;
}

/* Fade animation */
.container {
  animation: fadeIn 1.5s ease-in-out;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="container">
  <h1>🎮 Game Hub</h1>
  <p>Play the best browser games anytime</p>

  <div class="buttons">
    <button class="play" onclick="startGame()">▶ Play</button>
    <button class="login" onclick="login()">🔐 Login</button>
  </div>
</div>

<script>
function startGame() {
  alert("Game section coming next 🚀");
  // next: redirect to games page
}

function login() {
  alert("Login system coming next 🔐");
}
</script>

</body>
</html>
